spring:
  application:
    name: nexhire-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/nexhire}
    username: ${SPRING_DATASOURCE_USERNAME:nexhire}
    password: ${SPRING_DATASOURCE_PASSWORD:root1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    addresses: ${SPRING_RABBITMQ_ADDRESSES:}
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:nexhire}
    password: ${SPRING_RABBITMQ_PASSWORD:root1234}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    ssl:
      enabled: ${SPRING_RABBITMQ_SSL_ENABLED:false}
      validate-server-certificate: false

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:07f65aeb7653e5222410f0b42d76bda3cc3eaa12b3f0edb7329292f931899ac0598e061ace63faed6248b6610d3b2bee136e637f3fe2412fa5e300435248da6a}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000/nexhire-files}
  access-key: ${MINIO_ACCESS_KEY:nexhire-minio}
  secret-key: ${MINIO_SECRET_KEY:minio1234}
  bucket: ${MINIO_BUCKET:nexhire-files}
